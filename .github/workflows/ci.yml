name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # -S warning: info/style hints (SC2016 backticks-in-singles, SC1091 source-follow) are noise here
      - run: shellcheck -S warning factory.sh lib/*.sh test/*.sh
      - run: bash test/run.sh
